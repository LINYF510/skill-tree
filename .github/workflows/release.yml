name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Skill-Tree-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Skill-Tree v${{ steps.version.outputs.VERSION }}
          body: |
            ## Skill-Tree v${{ steps.version.outputs.VERSION }}

            ### 功能亮点
            - 🌳 可视化技能树构建与管理
            - 🎨 Material You 动态颜色 + 暗色/亮色/跟随系统主题
            - 🌐 中英双语国际化支持
            - ✨ 粒子特效 + 节点解锁动画
            - 📷 CameraX 拍照添加附件
            - ♿ 完整无障碍支持（TalkBack + 键盘导航）
            - 🏆 10 个成就系统
            - 📊 统计面板
            - 📤 Markdown 导出
            - 🔒 本地数据存储，隐私安全

            ### 安装说明
            1. 下载 APK 文件
            2. 在 Android 设备上启用"允许安装未知来源应用"
            3. 安装 APK
            4. 最低系统要求：Android 8.0 (API 26)
          files: |
            app/build/outputs/apk/release/Skill-Tree-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
